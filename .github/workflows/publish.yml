name: Publish ICS

on:
  workflow_dispatch: # 수동 실행
  schedule:
    # 매일 2회 — 시간은 cron이 UTC 기준이므로 KST에서 빼야 함
    - cron: '0 19 * * *' # KST 새벽 04:00 (UTC 19:00 전날)
    - cron: '0 14 * * *' # KST 저녁 23:00 (UTC 14:00)

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write # 실패 시 issue 자동 생성용

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run full check (typecheck + lint + format + test)
        run: pnpm check

      # 실패 시: 워크플로가 그대로 실패 → GitHub Actions 자동 알림.
      # 기존 public/t1.ics는 갱신되지 않으므로 GitHub Pages는 마지막 성공본을
      # 계속 서빙 — 사용자 캘린더에는 기존 매치가 유지되고 신규 매치만 lag.
      - name: Generate t1.ics
        run: pnpm dev

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # build·deploy 둘 다 실패 시 issue 자동 생성 — GitHub 알림은 일회성이지만
  # issue는 영구 기록 + 상태 관리 (해결 시 close). 매 실패마다 새 issue
  # (cron 12h 주기라 빈번하지 않음 + 군주가 직접 close).
  notify-on-failure:
    needs: [build, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create issue on failure
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const kstTime = new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });
            const body = [
              `**워크플로 실패** — ${kstTime} KST`,
              ``,
              `- Run: ${runUrl}`,
              `- 트리거: \`${context.eventName}\``,
              `- 직전 commit: \`${context.sha.slice(0, 7)}\``,
              ``,
              `## 다음 단계`,
              `1. 위 Run 링크에서 로그 확인 — \`[lck-schedule-sync] FATAL:\` 메시지로 원인 파악`,
              `2. 흔한 원인:`,
              `   - 네이버 API 429/500 → 12h 후 cron 자동 재시도 (보통 자가 해결)`,
              `   - 매치 0개 (silent fail) → 네이버 schema 변경 가능성, 수동 점검 필요`,
              `   - GitHub Pages 배포 실패 → Actions 자체 문제 (재시도)`,
              `3. 해결되면 이 issue close`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Publish ICS 실패 — Run #${context.runId}`,
              body,
            });
