version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '09:00'
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    groups:
      dev-deps:
        dependency-type: development
        update-types:
          - minor
          - patch
      production:
        dependency-type: production
        update-types:
          - minor
          - patch
    # 메이저 업데이트는 그룹에서 제외 → 의존성별 개별 PR로 자동 생성
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
